name: Deploy install.sh to S3

on:
  push:
    branches: [main]
    paths: [install.sh, install.ps1, install.cmd]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload installers to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp install.sh "s3://${S3_BUCKET}/install.sh" \
            --content-type "text/plain" \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp install.ps1 "s3://${S3_BUCKET}/install.ps1" \
            --content-type "text/plain" \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp install.cmd "s3://${S3_BUCKET}/install.cmd" \
            --content-type "text/plain" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/install.sh" "/install.ps1" "/install.cmd"
